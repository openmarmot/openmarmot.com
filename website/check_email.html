<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Inspector v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: system-ui, sans-serif; }
        pre { white-space: pre-wrap; word-break: break-all; }
        .risk-critical { background-color: #fee2e2; color: #b91c1c; }
        .risk-high { background-color: #fef3c7; color: #b45309; }
        .risk-medium { background-color: #dbeafe; color: #1e40af; }
    </style>
</head>
<body class="bg-gray-50 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-2">Email Inspector v2</h1>
        <p class="text-gray-600 mb-6">Paste the full raw email source (headers + body) below</p>

        <textarea id="emailText" class="w-full h-64 p-4 border rounded-xl font-mono text-sm" placeholder="Paste raw email here..."></textarea>
        
        <button onclick="inspectEmail()" 
                class="mt-4 px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white font-semibold rounded-xl transition">
            Analyze Email
        </button>

        <div id="result" class="mt-8"></div>
    </div>

    <script>
        function tailwindInit() {
            // Tailwind script already loaded
        }

        function parseHeaders(raw) {
            const parts = raw.split(/\r?\n\r?\n/);
            const headerText = parts[0];
            const body = parts.slice(1).join('\n\n');
            
            const headers = {};
            const lines = headerText.split(/\r?\n/);
            let currentKey = null;

            for (let line of lines) {
                if (line.startsWith(' ') || line.startsWith('\t')) {
                    // Continuation of previous header
                    if (currentKey) headers[currentKey][headers[currentKey].length - 1] += ' ' + line.trim();
                } else {
                    const match = line.match(/^([^:]+):\s*(.*)$/);
                    if (match) {
                        currentKey = match[1].trim().toLowerCase();
                        if (!headers[currentKey]) headers[currentKey] = [];
                        headers[currentKey].push(match[2].trim());
                    }
                }
            }
            return { headers, body };
        }

        function parseAuthResults(authLines) {
            let spf = 'unknown', dkim = 'unknown', dmarc = 'unknown', policy = 'none';
            const text = (authLines || []).join(' ').toLowerCase();
            
            if (text.includes('spf=pass')) spf = 'pass';
            else if (text.includes('spf=softfail')) spf = 'softfail';
            else if (text.includes('spf=fail')) spf = 'fail';

            if (text.includes('dkim=pass')) dkim = 'pass';
            else if (text.includes('dkim=none')) dkim = 'none';
            else if (text.includes('dkim=fail')) dkim = 'fail';

            if (text.includes('dmarc=pass')) dmarc = 'pass';
            else if (text.includes('dmarc=fail')) dmarc = 'fail';

            if (text.includes('policy=reject')) policy = 'reject';
            else if (text.includes('policy=quarantine')) policy = 'quarantine';

            return { spf, dkim, dmarc, policy };
        }

        function extractLinks(body) {
            const linkRegex = /<a[^>]+href=["']([^"']+)["'][^>]*>(.*?)<\/a>/gi;
            const links = [];
            let match;
            while ((match = linkRegex.exec(body)) !== null) {
                links.push({
                    href: match[1].trim(),
                    text: match[2].trim().replace(/<[^>]+>/g, '')
                });
            }
            return links;
        }

        function calculateRisk(headers, auth, links, body) {
            let score = 0;
            const reasons = [];

            const from = headers.from ? headers.from[0] : '';
            const to = headers.to ? headers.to[0] : '';
            const returnPath = headers['return-path'] ? headers['return-path'][0] : '';
            const domain = (from.match(/@([\w.-]+)/) || [''])[1];

            // Self-spoof detection
            if (domain && to.includes(domain) && (auth.spf !== 'pass' || auth.dkim !== 'pass')) {
                score += 35;
                reasons.push("Self-domain spoofing detected (From matches your domain but authentication failed)");
            }

            // Auth failures
            if (auth.spf === 'softfail' || auth.spf === 'fail') { score += 20; reasons.push("SPF " + auth.spf); }
            if (auth.dkim === 'none' || auth.dkim === 'fail') { score += 15; reasons.push("DKIM " + auth.dkim); }
            if (auth.dmarc === 'fail' && auth.policy === 'none') { score += 25; reasons.push("DMARC fail with policy=none (no protection)"); }

            // Spam headers
            if (headers['x-spamd-status'] && headers['x-spamd-status'][0].includes('Spam')) {
                score += 15; reasons.push("Server marked as Spam (X-Spamd-Status)");
            }

            // Suspicious links
            const suspiciousLinks = links.filter(l => 
                l.href.includes('t.co') || 
                l.href.includes('.cc/') || 
                l.href.length < 30 && l.text.includes('http')
            );
            if (suspiciousLinks.length > 0) {
                score += 30;
                reasons.push(`Suspicious shortener/phishing link detected (${suspiciousLinks.length} links)`);
            }

            // Financial urgency
            if (/dispute|chargeback|reversal|\$|950\.50|chase/i.test(body)) {
                score += 15;
                reasons.push("Banking/urgent financial language");
            }

            return { score: Math.min(100, score), reasons, suspiciousLinks };
        }

        function inspectEmail() {
            const raw = document.getElementById('emailText').value.trim();
            if (!raw) return alert("Paste an email first!");

            const { headers, body } = parseHeaders(raw);
            const authLines = headers['authentication-results'] || [];
            const auth = parseAuthResults(authLines);
            const links = extractLinks(body);
            const risk = calculateRisk(headers, auth, links, body);

            let html = `
                <div class="bg-white rounded-2xl shadow-xl p-8">
                    <div class="flex items-center gap-4 mb-6">
                        <div class="text-5xl font-bold ${risk.score > 70 ? 'risk-critical' : risk.score > 40 ? 'risk-high' : 'risk-medium'} px-6 py-2 rounded-2xl">
                            ${risk.score}/100
                        </div>
                        <div>
                            <h2 class="text-2xl font-bold">Risk Assessment</h2>
                            <p class="text-gray-500">Higher = more likely scam/phish</p>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <!-- Authentication -->
                        <div class="border rounded-xl p-6">
                            <h3 class="font-semibold mb-4 text-lg">Authentication Analysis</h3>
                            <div class="space-y-3">
                                <div class="flex justify-between"><span class="font-medium">SPF:</span> <span class="${auth.spf === 'pass' ? 'text-green-600' : 'text-red-600'}">${auth.spf}</span></div>
                                <div class="flex justify-between"><span class="font-medium">DKIM:</span> <span class="${auth.dkim === 'pass' ? 'text-green-600' : 'text-red-600'}">${auth.dkim}</span></div>
                                <div class="flex justify-between"><span class="font-medium">DMARC:</span> <span class="${auth.dmarc === 'pass' ? 'text-green-600' : 'text-red-600'}">${auth.dmarc} (policy: ${auth.policy})</span></div>
                            </div>
                        </div>

                        <!-- Links -->
                        <div class="border rounded-xl p-6">
                            <h3 class="font-semibold mb-4 text-lg">Links Found (${links.length})</h3>
                            <div class="max-h-64 overflow-auto text-sm">
                                ${links.length ? links.map(l => `
                                    <div class="mb-3 p-3 bg-gray-100 rounded-lg">
                                        <strong>Text:</strong> ${l.text}<br>
                                        <strong>Real URL:</strong> <a href="${l.href}" target="_blank" class="text-blue-600 break-all">${l.href}</a>
                                    </div>`).join('') : '<p class="text-gray-500">No links found</p>'}
                            </div>
                        </div>
                    </div>

                    <!-- Indicators -->
                    <div class="mt-8 border rounded-xl p-6">
                        <h3 class="font-semibold mb-4 text-lg">Scam Indicators</h3>
                        <ul class="space-y-2">
                            ${risk.reasons.map(r => `<li class="flex items-start gap-2"><span class="text-red-500">●</span> ${r}</li>`).join('')}
                        </ul>
                    </div>

                    <!-- Raw Headers Summary -->
                    <details class="mt-8">
                        <summary class="font-semibold cursor-pointer">Full Parsed Headers (click to expand)</summary>
                        <pre class="mt-4 text-xs bg-gray-900 text-gray-300 p-4 rounded-xl overflow-auto">${JSON.stringify(headers, null, 2)}</pre>
                    </details>
                </div>
            `;

            document.getElementById('result').innerHTML = html;
        }

        // Auto-init Tailwind
        window.onload = tailwindInit;
    </script>
</body>
</html>
